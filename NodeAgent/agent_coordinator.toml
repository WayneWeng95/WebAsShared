# NodeAgent config — coordinator (node 0)

node_id = 0
role = "coordinator"

[cluster]
ips = ["10.10.1.2", "10.10.1.1"]
agent_port = 9500

[paths]
executor_bin = "/opt/myapp/WebAsShared/Executor/target/release/host"
executor_work_dir = "/opt/myapp/WebAsShared"

[metrics]
interval_ms = 2000
log_path = "/tmp/node_agent_metrics.jsonl"

[timeouts]
job_timeout_s = 600
health_check_s = 5
