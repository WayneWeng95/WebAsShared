# RMMap mapper — WARM (steady-state reuse). min-scale=60 pre-warms the full fan so
# the 60 concurrent mapper invocations all hit already-running pods — the apples-to-
# apples analogue of Cloudburst's 60 static executor pods (no startup cost in the
# measured window). containerConcurrency=1 keeps it strictly 1 request per pod.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wc-mapper
  namespace: baselines
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "60"
        autoscaling.knative.dev/max-scale: "128"   # 16/node × 8 workers ceiling
        autoscaling.knative.dev/target: "1"
    spec:
      # 16/node cap: keep mapper pods OFF node-0 (control-plane/coordinator) and spread
      # ≤16 per worker. NOTE: these podSpec fields are feature-gated in Knative — enable once:
      #   kubectl -n knative-serving patch cm config-features --type merge -p \
      #     '{"data":{"kubernetes.podspec-affinity":"enabled","kubernetes.podspec-topologyspreadconstraints":"enabled"}}'
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: { serving.knative.dev/service: wc-mapper }
      containerConcurrency: 1
      timeoutSeconds: 600
      containers:
        - image: dev.local/wc-mapper:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: REDIS_HOST, value: redis.baselines.svc.cluster.local }
            - { name: REDIS_PORT, value: "6379" }
          # FAIRNESS CAP: 1 CPU + 2 GiB RAM per mapper pod (matches our per-executor budget).
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "1", memory: "2Gi" }
