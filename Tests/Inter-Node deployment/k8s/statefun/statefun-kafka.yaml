# Flink StateFun messaging env — Kafka cluster + topics, modernized for a current
# Strimzi operator (v1beta2). The streaming benchmark's original manifest is
# kafka.strimzi.io/v1beta1 + Kafka 2.4.0, which current Strimzi no longer accepts;
# this keeps the SAME cluster name (kafka-cluster) and topic names so the existing
# StateFun master/function deployments
#   ../../../Streaming Application_Benchmark/intra-node/baseline/FlinkStateFun/deployment/k8s/
# resolve `kafka-cluster-kafka-bootstrap:9092` unchanged. Deployed in `default`
# (the StateFun deployments are namespace-less → default). Applied by 06-strimzi.sh.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
spec:
  kafka:
    version: 3.7.1
    replicas: 2
    listeners:
      - name: plain        # in-cluster: kafka-cluster-kafka-bootstrap:9092
        port: 9092
        type: internal
        tls: false
      - name: external     # from a node (driver/producer): NodePort
        port: 9094
        type: nodeport
        tls: false
    config:
      auto.create.topics.enable: "false"
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.7"
    storage:
      type: ephemeral
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
  entityOperator:        # reconciles the KafkaTopic CRs below
    topicOperator: {}
    userOperator: {}
---
# Topics (10, 10 partitions each) — same names the StateFun functions subscribe to:
# MediaReview (mr_*), SocialNetwork (sn_*), and the shared `responses` egress.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: mr_seed,     labels: { strimzi.io/cluster: kafka-cluster } }
spec: { partitions: 10, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: mr_login,    labels: { strimzi.io/cluster: kafka-cluster } }
spec: { partitions: 10, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: mr_rate,     labels: { strimzi.io/cluster: kafka-cluster } }
spec: { partitions: 10, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: mr_review,   labels: { strimzi.io/cluster: kafka-cluster } }
spec: { partitions: 10, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: sn_seed,     labels: { strimzi.io/cluster: kafka-cluster } }
spec: { partitions: 10, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata: { name: sn_login,    labels: { strimzi.io/cluster: kafka-cluster } }
