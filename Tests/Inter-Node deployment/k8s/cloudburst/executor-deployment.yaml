# Cloudburst executor pool — `replicas` worker pods spread across the 8 WORKER nodes
# ONLY (node-0 is the Redis holder + coordinator, excluded via nodeAffinity below), each
# pulling tasks off the shared Redis queue. The 9-node cluster caps each physical worker
# at 16 executors → 8 × 16 = 128 slots, so replicas=128 with a HARD topologySpread
# (DoNotSchedule, maxSkew 1) lands exactly 16/node and never overflows a worker. Workloads
# with a smaller fan (e.g. terasort fanout 4) simply leave the extra pods idle.
# imagePullPolicy IfNotPresent — image is imported into every node's containerd
# (07-load-images-style ctr import), not pulled from a registry.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudburst-executor
  namespace: baselines
  labels: { app: cloudburst-executor }
spec:
  replicas: 128
  selector:
    matchLabels: { app: cloudburst-executor }
  template:
    metadata:
      labels: { app: cloudburst-executor }
    spec:
      # node-0 is control-plane + Redis/coordinator only — keep every executor OFF it so
      # the KVS/driver node isn't also carrying worker load (matches RMMap's 8-worker layout).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      # HARD 16/node cap: 8 eligible workers × maxSkew 1 × DoNotSchedule → 16 pods each.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: { app: cloudburst-executor }
      containers:
        - name: executor
          image: cloudburst-executor:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: REDIS_HOST, value: redis.baselines.svc.cluster.local }
            - { name: REDIS_PORT, value: "6379" }
            - { name: CB_TASK_QUEUE, value: "cb:tasks" }
          # FAIRNESS CAP: 1 CPU per worker pod. Memory 4Gi here because this cluster pool
          # also runs the CONVERGENCE stages — FINRA's 3 stateful full-trades rules, TeraSort's
          # merge/gather, matrix assemble — where a pod ingests full (not sharded) data and a
          # 2Gi cap OOM-kills it (long-lived pods also accumulate RSS across tasks). Single
          # fan-out executors elsewhere stay 2Gi (see executor-single-node.yaml); the shared
          # queue means any pod here may draw a convergence task, so the whole pool is sized 4Gi.
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "1", memory: "4Gi" }
