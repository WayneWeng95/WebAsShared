syntax = "proto3";

// Streaming-application benchmark (RTSFaaS MediaReview / SocialNetwork) adapted
// to Apache Flink Stateful Functions, as a third comparable system alongside
// WebAsShared and the RTSFaaS baseline. Mirrors the message style of the
// vendored statefun-python-ycsb-example (Wrapper{request_id, Any} in / Response
// out over Kafka), so it plugs into the same evaluation harness.
package streaming.messages;

import "google/protobuf/any.proto";

// Ingress envelope: the producer packs one operation into `message` and tags it
// with a unique request_id so the egress side can match input->output.
message Wrapper {
    string request_id = 1;
    google.protobuf.Any message = 2;
}

// ----------------------------------------------------------------------------
// MediaReview: three keyed state tables held as one per-key State.
//   user_pwd.password  (login  READ)
//   movie_rating.rate  (rate   WRITE)
//   movie_review.review(review WRITE)
// ----------------------------------------------------------------------------
message MRState {
    string password = 1;
    string rate = 2;
    string review = 3;
}

message MRSeed   { string id = 1; string password = 2; }
message MRLogin  { string id = 1; string password = 2; }
message MRRate   { string id = 1; string rate = 2; }
message MRReview { string id = 1; string review = 2; }

// ----------------------------------------------------------------------------
// SocialNetwork: user_pwd / user_profile / tweet held as one per-key State.
//   userLogin   READ  user_pwd       (single key)
//   userProfile READ  user_profile   (single key)
//   getTimeLine READ  tweet  x2 keys (key and key+1)
//   postTweet   WRITE tweet  x2 keys (key and key+1)
// The x2-key ops fan out to the key+1 partition *inside the dataflow* (a
// cross-partition state access), mirroring RTSFaaS's multi-partition txns and
// the cross-node state-transfer cost WebAsShared optimizes.
// ----------------------------------------------------------------------------
message SNState {
    string password = 1;
    string profile = 2;
    string tweet = 3;
}

message SNSeed     { string id = 1; string password = 2; string profile = 3; string tweet = 4; }
message SNLogin    { string id = 1; string password = 2; }
message SNProfile  { string id = 1; }
message SNTimeline { string id = 1; }
message SNPost     { string id = 1; string tweet = 2; }

// Internal fan-out to the second key (carries the originating request_id so the
// second partition can emit its own matchable response).
message SNTimeline2 { string request_id = 1; }
message SNPost2     { string request_id = 1; string tweet = 2; }

// Egress record. `op` is the operation class (login/rate/review/profile/
// timeline/post) so the measure side can tally the correctness gate by op, and
// status_code (200 ok / 422 miss) is the per-access result.
message Response {
    string request_id = 1;
    int32 status_code = 2;
    string op = 3;
    google.protobuf.Any message = 4;
}
