# Kafka topics for the streaming-application workloads. Workload-prefixed so the
# two apps share one deployment: mr_* -> mediareview_function, sn_* ->
# socialnetwork_function; `responses` is the shared egress. Kept as a separate
# manifest so the harness can drop/recreate topics between throughput steps.
apiVersion: kafka.strimzi.io/v1beta1
kind: KafkaTopic
metadata:
  name: mr_seed
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 10
  replicas: 1
  config:
    retention.ms: 7200000
    segment.bytes: 1073741824
---
