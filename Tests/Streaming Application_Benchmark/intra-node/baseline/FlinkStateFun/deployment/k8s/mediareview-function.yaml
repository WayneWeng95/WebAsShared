---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediareview-function
spec:
  selector:
    matchLabels:
      service: mediareview-function
  replicas: 2
  template:
    metadata:
      labels:
        service: mediareview-function
    spec:
      containers:
        - name: mediareview-function
          image: streaming-example-mediareview
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mediareview-function
spec:
  type: ClusterIP
  selector:
    service: mediareview-function
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
